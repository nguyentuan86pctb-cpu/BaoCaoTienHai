<!DOCTYPE html>
<html class="light" lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EVNNPC - Điện lực Tiền Hải Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        theme: {
            extend: {
                "colors": {
                    "primary": "#003d7c", "primary-container": "#0054a6",
                    "background": "#f8f9ff", "surface": "#f8f9ff",
                    "on-surface": "#0b1c30", "outline-variant": "#c2c6d3"
                },
                "spacing": { "sidebar_width": "260px", "gutter": "24px", "stack_lg": "24px" }
            }
        }
    }
</script>
</head>
<body class="bg-background text-on-background font-sans flex h-screen overflow-hidden">

<nav class="bg-[#002B54] text-white fixed left-0 top-0 h-full w-[260px] flex flex-col py-6 z-40 hidden md:flex">
    <div class="px-6 mb-8 flex flex-col gap-2">
        <span class="text-xl font-black">EVNNPC</span>
        <span class="opacity-80 text-xs uppercase tracking-wider">Điện lực Tiền Hải</span>
    </div>
    <div class="flex-1 overflow-y-auto flex flex-col gap-1">
        <a class="bg-[#004080] border-l-4 border-yellow-400 flex items-center gap-3 px-4 py-3" href="#">
            <span class="material-symbols-outlined">assessment</span> Báo cáo mang tải
        </a>
    </div>
</nav>

<div class="flex-1 flex flex-col md:ml-sidebar_width h-full w-full overflow-hidden">
    <header class="bg-white border-b flex justify-between items-center h-16 px-6 sticky top-0 z-50">
        <span class="text-lg font-bold text-[#0054A6]">EVNNPC - TIỀN HẢI</span>
    </header>

    <main class="flex-1 overflow-y-auto p-6">
        <div class="max-w-7xl mx-auto flex flex-col gap-6">
            <h1 class="text-3xl font-bold text-center text-blue-900">TỔNG HỢP CÁC BÁO CÁO MANG TẢI</h1>

            <section class="bg-white rounded-xl border p-6 shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-semibold">Dữ liệu Báo Cáo</h3>
                    <div class="flex items-center gap-3">
                        <span id="cap-nhat-luc" class="text-sm italic text-gray-500">Đang tải...</span>
                        <button onclick="taiDuLieu()" class="bg-blue-600 text-white px-4 py-2 rounded flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm">refresh</span> Làm mới
                        </button>
                    </div>
                </div>

                <div class="border rounded-lg overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-max">
                            <thead class="bg-slate-100 text-sm font-semibold">
                                <tr>
                                    <th class="px-2 py-2 border-r text-center">STT</th>
                                    <th class="px-2 py-2 border-r">Tên khách hàng</th>
                                    <th class="px-2 py-2 border-r">Thời gian</th>
                                    <th class="px-2 py-2 border-r text-right">Mang tải (%)</th>
                                    <th class="px-2 py-2 border-r text-right">Lệch pha (%)</th>
                                    <th class="px-2 py-2 border-r text-right bg-blue-50">Công suất (kW)</th>
                                    <th class="px-2 py-2 border-r text-right">I_A (A)</th>
                                    <th class="px-2 py-2 border-r text-right">I_B (A)</th>
                                    <th class="px-2 py-2 border-r text-right">I_C (A)</th>
                                    <th class="px-2 py-2 border-r text-right">U_A (V)</th>
                                    <th class="px-2 py-2 border-r text-right">U_B (V)</th>
                                    <th class="px-2 py-2 text-right">U_C (V)</th>
                                </tr>
                            </thead>
                            <tbody id="bang-du-lieu" class="text-sm divide-y">
                                <tr><td colspan="12" class="text-center py-8">Đang tải dữ liệu...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="bg-slate-50 px-4 py-3 border-t flex justify-between items-center text-sm">
                        <span id="phan-trang-info">--</span>
                        <div id="phan-trang-nut" class="flex gap-1"></div>
                    </div>
                </div>
            </section>
        </div>
    </main>
</div>

<script>
const SO_DONG_MOI_TRANG = 15;
let duLieuToan = [];
let trangHienTai = 1;

async function taiDuLieu() {
    try {
        const res = await fetch(`https://raw.githubusercontent.com/nguyentuan86pctb-cpu/BaoCaoTienHai/main/data.json?t=${Date.now()}`);
        const json = await res.json();
        duLieuToan = json.du_lieu || [];
        document.getElementById('cap-nhat-luc').textContent = `Cập nhật: ${json.cap_nhat_luc} | Tổng: ${json.tong_ban_ghi}`;
        renderBang();
    } catch (err) {
        document.getElementById('bang-du-lieu').innerHTML = `<tr><td colspan="12" class="text-center text-red-500 py-8">Lỗi: ${err.message}</td></tr>`;
    }
}

function renderBang() {
    const tbody = document.getElementById('bang-du-lieu');
    const batDau = (trangHienTai - 1) * SO_DONG_MOI_TRANG;
    const duLieuTrang = duLieuToan.slice(batDau, batDau + SO_DONG_MOI_TRANG);

    tbody.innerHTML = duLieuTrang.map((row, idx) => {
        const styleMT = (parseFloat(row.i_MANG_TAI) >= 200) ? 'bg-red-600 text-white font-bold' : '';
        const styleLP = (parseFloat(row.i_LECH_PHA) >= 50) ? 'bg-red-600 text-white font-bold' : '';
        
        return `
        <tr class="hover:bg-blue-50 ${idx % 2 === 0 ? '' : 'bg-slate-50'}">
            <td class="px-2 py-2 border-r text-center">${row.stt ?? ''}</td>
            <td class="px-2 py-2 border-r">${row.teN_KHANG ?? ''}</td>
            <td class="px-2 py-2 border-r">${row.thoI_GIAN ?? ''}</td>
            <td class="px-2 py-2 border-r text-right ${styleMT}">${parseFloat(row.i_MANG_TAI || 0).toFixed(2)}</td>
            <td class="px-2 py-2 border-r text-right ${styleLP}">${parseFloat(row.i_LECH_PHA || 0).toFixed(2)}</td>
            <td class="px-2 py-2 border-r text-right font-medium text-blue-700">${row.conG_SUAT ?? '0'}</td>
            <td class="px-2 py-2 border-r text-right">${row.donG_DIEN_A ?? ''}</td>
            <td class="px-2 py-2 border-r text-right">${row.donG_DIEN_B ?? ''}</td>
            <td class="px-2 py-2 border-r text-right">${row.donG_DIEN_C ?? ''}</td>
            <td class="px-2 py-2 border-r text-right">${row.daP_A ?? ''}</td>
            <td class="px-2 py-2 border-r text-right">${row.daP_B ?? ''}</td>
            <td class="px-2 py-2 text-right">${row.daP_C ?? ''}</td>
        </tr>`;
    }).join('');
    
    document.getElementById('phan-trang-info').textContent = `Hiển thị ${batDau + 1} - ${Math.min(batDau + SO_DONG_MOI_TRANG, duLieuToan.length)} / ${duLieuToan.length}`;
    renderPhanTrang();
}

function renderPhanTrang() {
    const tongTrang = Math.ceil(duLieuToan.length / SO_DONG_MOI_TRANG);
    const div = document.getElementById('phan-trang-nut');
    div.innerHTML = '';
    for (let i = 1; i <= tongTrang; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.className = `w-8 h-8 rounded border ${i === trangHienTai ? 'bg-blue-600 text-white' : 'bg-white'}`;
        btn.onclick = () => { trangHienTai = i; renderBang(); };
        div.appendChild(btn);
    }
}

taiDuLieu();
setInterval(taiDuLieu, 60000);
</script>
</body>
</html>
